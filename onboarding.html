<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#09090b" />
  <title>Онбординг — Заруба</title>
  <link rel="stylesheet" href="css/zaruba-vibes.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: "class" };</script>
</head>
<body class="zb-page-bg flex min-h-dvh items-center justify-center bg-[#09090b] px-4 py-8 text-white">
  <div id="card" class="zb-glass zb-shine relative w-full max-w-md overflow-hidden rounded-3xl p-8"></div>

  <script src="js/constants.js"></script>
  <script src="js/api-client.js"></script>
  <script src="js/session.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ui.js"></script>
  <script>
    zarubaInitTheme();
    var uid = ZarubaSession.get();
    if (!uid) window.location.href = "login.html";

    var slides = [
      { emoji: "⚽", title: "Забить Зарубу", text: "Собери двор, короб или школу — кинь ссылку пацанам." },
      { emoji: "📣", title: "Привести фанатов", text: "У каждого игрока своя ссылка. Чем больше тусовка — тем жирнее чипсеки." },
      { emoji: "🪙", title: "Получить баллы", text: "Победы, голы, MVP и челленджи. Только виртуалка — без кэша и рисков." },
    ];
    var i = 0;

    function render() {
      var s = slides[i];
      document.getElementById("card").innerHTML =
        '<div class="text-5xl">' + s.emoji + "</div>" +
        '<p class="zb-eyebrow zb-eyebrow-accent mt-4 text-xs tracking-[0.2em]">' + (i + 1) + " из " + slides.length + "</p>" +
        '<h1 class="font-zb-display mt-2 text-4xl font-bold leading-tight sm:text-5xl">' + s.title + "</h1>" +
        '<p class="mt-3 text-sm leading-relaxed text-zinc-400">' + s.text + "</p>" +
        '<div class="mt-8 flex flex-wrap gap-3">' +
        (i > 0 ? '<button type="button" id="prev" class="zb-tap rounded-2xl border border-zb-accent px-6 py-3.5 font-bold text-zb-accent">Назад</button>' : "") +
        '<button type="button" id="next" class="zb-tap zb-btn-primary flex-1 min-w-[8rem] py-3.5 text-sm shadow-zb">' +
        (i < slides.length - 1 ? "Дальше" : "Погнали!") +
        "</button></div>";
      var prev = document.getElementById("prev");
      if (prev) prev.onclick = function () { i--; render(); };
      document.getElementById("next").onclick = function () {
        if (i < slides.length - 1) {
          i++;
          render();
        } else {
          mockDb.completeOnboarding(uid).then(function () {
            window.location.href = "index.html";
          });
        }
      };
    }
    render();
  </script>
</body>
</html>
